<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Staff Monthly Schedule Panel</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
<link rel="preload" as="image" href="assets/characters/acin.webp">
<link rel="preload" as="image" href="assets/characters/herman.webp">
<link rel="preload" as="image" href="assets/characters/david.webp">
<link rel="preload" as="image" href="assets/characters/hari.webp">
<link rel="preload" as="image" href="assets/characters/budi.webp">
<link rel="preload" as="image" href="assets/characters/dea.webp">  

<link rel="icon" href="favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="page-background"></div>

<div class="app-container">

<header class="main-header">

<div class="header-content">

<div class="logo-section">

<div class="logo-icon">

<svg viewBox="0 0 40 40" fill="none">

<rect width="40" height="40" rx="10" fill="url(#logoGrad)"/>

<path d="M12 20C12 16.6863 14.6863 14 18 14C21.3137 14 24 16.6863 24 20C24 23.3137 21.3137 26 18 26"
stroke="white" stroke-width="2" stroke-linecap="round"/>

<path d="M18 14V26M14 20H22"
stroke="white" stroke-width="2" stroke-linecap="round"/>

<circle cx="28" cy="12" r="6" fill="#8b5cf6"/>

<path d="M25 12L27 14L30 10"
stroke="white" stroke-width="1.5" stroke-linecap="round"/>

<defs>
<linearGradient id="logoGrad" x1="0" y1="0" x2="40" y2="40">
<stop stop-color="#6366f1"/>
<stop offset="1" stop-color="#8b5cf6"/>
</linearGradient>
</defs>

</svg>

</div>

<div class="title-group">
<h1>Staff Schedule</h1>
<p class="subtitle">Team shift management</p>
</div>

</div>

<div class="header-meta" id="scheduleMeta">
<span class="month-badge">MARCH 2026</span>
</div>

</div>

</header>


<main class="main-content">

<div class="staff-grid" id="staffGrid">
<!-- Staff cards generated by script.js -->
</div>

</main>

<main class="main-content">

<!-- STAFF SELECT -->
<div class="staff-grid" id="staffGrid"></div>

<!-- CHARACTER INFO PANEL -->
<div class="character-info-panel" id="characterInfoPanel">

<div class="info-layout">

<!-- CHARACTER -->
<div class="info-character">

<video id="panelCharacterVideo"
autoplay
loop
muted
playsinline
style="display:none;"></video>

<img id="panelCharacterImage" src="">

</div>

<!-- SCHEDULE -->
<div class="info-schedule">

<h3 id="panelName">Select Character</h3>
<div id="panelRole"></div>

<div class="calendar-wrapper">

<div class="calendar-weekdays">
<span>Su</span>
<span>Mo</span>
<span>Tu</span>
<span>We</span>
<span>Th</span>
<span>Fr</span>
<span>Sa</span>
</div>

<div class="calendar-grid" id="panelCalendar"></div>

</div>

</div>

</div>

</div>

</main>
    
<footer class="main-footer">
<p>monthly schedule</p>
</footer>

</div>


<!-- MODAL -->

<div class="modal-overlay" id="scheduleModal">

<div class="modal-container">

<button class="modal-close" id="modalClose">

<svg viewBox="0 0 24 24">
<path d="M18 6L6 18M6 6L18 18"
stroke="currentColor"
stroke-width="2"
stroke-linecap="round"/>
</svg>

</button>


<div class="modal-header">

<div class="modal-avatar-section">

<div class="modal-avatar" id="modalAvatar"></div>

<div class="modal-identity">

<h2 id="modalName">Staff Name</h2>

<span class="role-badge" id="modalRole">Role</span>

<p class="personality-text" id="modalPersonality">Personality</p>

</div>

</div>

</div>


<div class="modal-body split-layout">


<!-- CHARACTER -->

<div class="character-panel">

<video
id="modalCharacterVideo"
autoplay
loop
muted
playsinline
style="display:none;">
</video>

<img id="modalFullCharacter" src="" />

</div>


<!-- SCHEDULE -->

<div class="schedule-panel">

<div class="calendar-header">

<h3>Monthly Schedule</h3>

<div class="shift-legend">

<div class="legend-item">
<span class="legend-dot shift-p"></span>
<span>P - Morning</span>
</div>

<div class="legend-item">
<span class="legend-dot shift-m"></span>
<span>M - Night</span>
</div>

<div class="legend-item">
<span class="legend-dot shift-off"></span>
<span>OFF - Day Off</span>
</div>

</div>

</div>


<div class="calendar-wrapper">

<div class="calendar-weekdays">

<span>Su</span>
<span>Mo</span>
<span>Tu</span>
<span>We</span>
<span>Th</span>
<span>Fr</span>
<span>Sa</span>

</div>

<div class="calendar-grid" id="calendarGrid"></div>

</div>

</div>

</div>

</div>

</div>


<script src="script.js"></script>

</body>
</html>
