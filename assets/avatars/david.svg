    <!-- Tactical headset -->
    <rect x="16" y="32" width="10" height="20" rx="2" fill="#1e40af"/>
    <rect x="74" y="32" width="10" height="20" rx="2" fill="#1e40af"/>
    <path d="M21 32 Q21 26 26 26 L74 26 Q79 26 79 32" stroke="#1e40af" stroke-width="3" fill="none"/>

    <!-- AL Badge -->
