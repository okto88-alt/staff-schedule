    <!-- Glasses -->
    <circle cx="40" cy="43" r="7" stroke="#8b5cf6" stroke-width="1.5" fill="none" opacity="0.6"/>
    <circle cx="60" cy="43" r="7" stroke="#8b5cf6" stroke-width="1.5" fill="none" opacity="0.6"/>
    <path d="M47 43 L53 43" stroke="#8b5cf6" stroke-width="1.5" opacity="0.6"/>
