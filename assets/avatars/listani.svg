    <ellipse cx="50" cy="42" rx="22" ry="26" fill="#f5d0c5"/>

    <!-- Hair - Calm/neat bun -->
    <path d="M28 38 Q28 18 50 14 Q72 18 72 38" fill="#5c4033"/>
    <circle cx="50" cy="18" r="10" fill="#5c4033"/>
    <circle cx="50" cy="18" r="7" fill="#7a5a45"/>

    <!-- Eyes - Calm -->
    <ellipse cx="40" cy="42" rx="4" ry="5" fill="#1e293b"/>
    <ellipse cx="60" cy="42" rx="4" ry="5" fill="#1e293b"/>
    <circle cx="41" cy="41" r="1.5" fill="white"/>
    <circle cx="61" cy="41" r="1.5" fill="white"/>

    <!-- Eyebrows - Gentle -->
    <path d="M35 36 Q40 34 45 36" stroke="#5c4033" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M55 36 Q60 34 65 36" stroke="#5c4033" stroke-width="1.5" fill="none" stroke-linecap="round"/>

    <!-- Nose -->
    <path d="M50 45 L48 51 L52 51" stroke="#e0b8a8" stroke-width="1.5" fill="none" stroke-linecap="round"/>

    <!-- Mouth - Gentle smile -->
