    <path d="M20 85 Q20 65 35 60 L65 60 Q80 65 80 85" fill="#8b5cf6"/>
    <path d="M25 80 Q25 70 35 68 L65 68 Q75 70 75 80" fill="#a78bfa"/>

    <!-- Neck -->
