<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Background Circle -->
    <circle cx="50" cy="50" r="48" fill="#1e293b"/>
    <circle cx="50" cy="50" r="45" fill="#334155"/>

    <!-- Shoulders/Body - Strong/broad -->
    <path d="M15 85 Q15 62 35 58 L65 58 Q85 62 85 85" fill="#dc2626"/>
    <path d="M20 80 Q20 70 35 68 L65 68 Q80 70 80 80" fill="#ef4444"/>

    <!-- Neck - Thick -->
    <rect x="40" y="48" width="20" height="17" rx="3" fill="#c48b6e"/>

    <!-- Face - Strong jaw -->
    <path d="M28 42 Q28 20 50 18 Q72 20 72 42 Q72 60 50 65 Q28 60 28 42" fill="#c48b6e"/>

    <!-- Hair - Short/strong -->
    <path d="M28 35 Q28 16 50 14 Q72 16 72 35 Q72 24 50 20 Q28 24 28 35" fill="#1a1a1a"/>
    <path d="M30 30 Q30 20 50 18 Q70 20 70 30" fill="#2d2d2d"/>

    <!-- Eyes - Strong look -->
    <ellipse cx="40" cy="40" rx="4" ry="5" fill="#1e293b"/>
    <ellipse cx="60" cy="40" rx="4" ry="5" fill="#1e293b"/>
    <circle cx="41" cy="39" r="1.5" fill="white"/>
    <circle cx="61" cy="39" r="1.5" fill="white"/>

    <!-- Eyebrows - Strong -->
    <path d="M34 33 Q40 30 46 33" stroke="#1a1a1a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M54 33 Q60 30 66 33" stroke="#1a1a1a" stroke-width="2.5" fill="none" stroke-linecap="round"/>

    <!-- Nose - Strong -->
    <path d="M50 42 L46 50 L54 50" stroke="#a87658" stroke-width="2" fill="none" stroke-linecap="round"/>

    <!-- Mouth - Serious -->
    <path d="M42 58 Q50 56 58 58" stroke="#8b5c5c" stroke-width="2.5" fill="none" stroke-linecap="round"/>

    <!-- Chin definition -->
    <path d="M42 62 Q50 66 58 62" stroke="#b0765c" stroke-width="1" fill="none" opacity="0.5"/>
</svg>
