    <ellipse cx="50" cy="42" rx="22" ry="26" fill="#e8b89e"/>

    <!-- BLACK Hair -->
    <path d="M28 38 Q28 16 50 12 Q72 16 72 38 Q72 26 50 20 Q28 26 28 38" fill="#111111"/>
    <path d="M30 32 Q30 20 50 18 Q70 20 70 32" fill="#1a1a1a"/>

