<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Background Circle -->
    <circle cx="50" cy="50" r="48" fill="#1e293b"/>
    <circle cx="50" cy="50" r="45" fill="#334155"/>

    <!-- Shoulders/Body - Senior/Authoritative -->
    <path d="M18 85 Q18 62 35 58 L65 58 Q82 62 82 85" fill="#7c3aed"/>
    <path d="M23 80 Q23 70 35 68 L65 68 Q77 70 77 80" fill="#8b5cf6"/>

    <!-- Neck -->
    <rect x="42" y="48" width="16" height="17" rx="3" fill="#e8b89e"/>

    <!-- Face - Mature/Wise -->
    <ellipse cx="50" cy="42" rx="22" ry="26" fill="#e8b89e"/>

    <!-- Hair - Grey/White (Senior) -->
    <path d="M28 38 Q28 16 50 12 Q72 16 72 38 Q72 26 50 20 Q28 26 28 38" fill="#9ca3af"/>
    <path d="M30 32 Q30 20 50 18 Q70 20 70 32" fill="#d1d5db"/>

    <!-- Eyes - Wise -->
    <ellipse cx="40" cy="42" rx="4" ry="5" fill="#1e293b"/>
    <ellipse cx="60" cy="42" rx="4" ry="5" fill="#1e293b"/>
    <circle cx="41" cy="41" r="1.5" fill="white"/>
    <circle cx="61" cy="41" r="1.5" fill="white"/>

    <!-- Eyebrows - Wise/Grey -->
    <path d="M35 35 Q40 32 45 35" stroke="#9ca3af" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M55 35 Q60 32 65 35" stroke="#9ca3af" stroke-width="2" fill="none" stroke-linecap="round"/>

    <!-- Nose -->
    <path d="M50 45 L47 52 L53 52" stroke="#d4a088" stroke-width="1.5" fill="none" stroke-linecap="round"/>

    <!-- Mouth - Warm smile -->
    <path d="M42 58 Q50 64 58 58" stroke="#b87870" stroke-width="2" fill="none" stroke-linecap="round"/>

    <!-- Glasses -->
    <circle cx="40" cy="43" r="8" stroke="#7c3aed" stroke-width="2" fill="none"/>
    <circle cx="60" cy="43" r="8" stroke="#7c3aed" stroke-width="2" fill="none"/>
    <path d="M48 43 L52 43" stroke="#7c3aed" stroke-width="2"/>

    <!-- Leader Badge -->
    <circle cx="75" cy="25" r="12" fill="#7c3aed"/>
    <text x="75" y="29" text-anchor="middle" fill="white" font-size="10" font-weight="bold">L</text>
</svg>
