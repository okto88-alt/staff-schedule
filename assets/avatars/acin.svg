    <!-- Face -->
    <ellipse cx="50" cy="42" rx="22" ry="26" fill="#fdb5a4"/>

    <!-- Hair - Confident slick back -->
    <path d="M28 35 Q28 15 50 12 Q72 15 72 35 Q72 25 50 22 Q28 25 28 35" fill="#1a1a2e"/>
    <path d="M30 30 Q30 20 50 18 Q70 20 70 30" fill="#2d2d44"/>

