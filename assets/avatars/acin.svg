<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Background Circle -->
    <circle cx="50" cy="50" r="48" fill="#1e293b"/>
    <circle cx="50" cy="50" r="45" fill="#334155"/>

