    <!-- Glasses -->
    <circle cx="40" cy="43" r="8" stroke="#1e293b" stroke-width="1.5" fill="none"/>
    <circle cx="60" cy="43" r="8" stroke="#1e293b" stroke-width="1.5" fill="none"/>
    <path d="M48 43 L52 43" stroke="#1e293b" stroke-width="1.5"/>

